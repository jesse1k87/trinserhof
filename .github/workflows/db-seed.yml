name: DB Seed

on:
  workflow_dispatch:

jobs:
  seed:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci
      - name: Generate Prisma client
        run: npm run db:generate -w @trinserhof/supabase
      - name: Seed database
        run: npm run db:seed -w @trinserhof/supabase
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
