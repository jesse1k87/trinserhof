name: Build and deploy PMS (to GitHub Pages)

on:
  push:
    branches:
      - main
    paths:
      - '.github/workflows/deploy-pms.yml'
      - 'apps/pms/**'
      - 'package-lock.json'
      - 'package.json'
      - 'packages/**'
      - 'turbo.json'
  workflow_dispatch:

concurrency:
  cancel-in-progress: true
  group: pages

permissions:
  contents: read
  id-token: write
  pages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
          cache: 'npm'

      - run: npm ci
      - name: Build
        run: npm run build --workspace=pms

      - uses: actions/upload-pages-artifact@v3
        with:
          path: apps/pms/public

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
