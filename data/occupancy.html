<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>Trinserhof — Room Occupancy by Year</title>
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
    <style>
      body {
        font-family: sans-serif;
        background: #f5f5f5;
        display: flex;
        flex-direction: column;
        align-items: center;
        padding: 2rem;
      }
      h1 { margin-bottom: 0.25rem; }
      p.note { color: #888; font-size: 0.85rem; margin-bottom: 2rem; }
      .chart-wrap { background: white; border-radius: 8px; padding: 2rem; box-shadow: 0 2px 8px rgba(0,0,0,.1); width: 100%; max-width: 1100px; }
    </style>
  </head>
  <body>
    <h1>Room Occupancy — Nights per Year</h1>
    <p class="note">CONFIRMED bookings only &nbsp;·&nbsp; 2017 and 2026 are partial years</p>
    <div class="chart-wrap">
      <canvas id="chart"></canvas>
    </div>
    <script>
      const years = ["2017","2018","2019","2020","2021","2022","2023","2024","2025","2026"];
      const rooms = ["101","102","103","104","106","107","108","109","110","111","112","113","114","116","117","118","119","121","124"];

      const data = {
        "2017": {"101":53,"102":25,"103":50,"104":32,"106":51,"107":40,"108":44,"109":51,"110":7,"111":43,"112":18,"113":39,"114":22,"116":17,"117":30,"118":23,"119":65,"121":31,"124":49},
        "2018": {"101":152,"102":43,"103":103,"104":103,"106":57,"107":71,"108":100,"109":90,"110":2,"111":121,"112":51,"113":99,"114":73,"116":52,"117":37,"118":58,"119":104,"121":89,"124":115},
        "2019": {"101":149,"102":29,"103":118,"104":112,"106":68,"107":90,"108":85,"109":70,"110":4,"111":56,"112":37,"113":103,"114":87,"116":46,"117":53,"118":69,"119":72,"121":42,"124":76},
        "2020": {"101":111,"102":32,"103":88,"104":97,"106":24,"107":69,"108":62,"109":59,"111":61,"112":41,"113":65,"114":60,"116":23,"117":56,"118":65,"119":105,"121":51,"124":71},
        "2021": {"101":80,"102":39,"103":61,"104":74,"106":50,"107":67,"108":81,"109":60,"110":121,"111":68,"112":41,"113":46,"114":79,"116":129,"117":39,"118":46,"119":72,"121":40,"124":37},
        "2022": {"101":85,"102":49,"103":48,"104":112,"106":36,"107":39,"108":6,"109":69,"111":55,"112":24,"113":42,"114":105,"116":29,"117":21,"118":61,"119":76,"121":31,"124":34},
        "2023": {"101":114,"102":38,"103":66,"104":121,"106":72,"107":23,"108":60,"109":95,"111":86,"112":58,"113":64,"114":79,"116":44,"118":70,"119":96,"121":52,"124":48},
        "2024": {"101":123,"102":47,"103":76,"104":135,"106":70,"107":1,"108":74,"109":91,"111":85,"112":45,"113":65,"114":81,"116":40,"118":97,"119":79,"121":72,"124":49},
        "2025": {"101":73,"102":23,"103":71,"104":116,"106":59,"108":46,"109":93,"111":66,"112":53,"113":72,"114":73,"116":39,"118":35,"119":73,"121":53,"124":49},
        "2026": {"101":91,"102":15,"103":54,"104":67,"106":42,"108":20,"109":32,"111":61,"112":28,"113":48,"114":35,"116":30,"118":28,"119":47,"121":35,"124":19},
      };

      // Generate visually distinct colors for 19 rooms
      const palette = [
        "#4e79a7","#f28e2b","#e15759","#76b7b2","#59a14f",
        "#edc948","#b07aa1","#ff9da7","#9c755f","#bab0ac",
        "#d37295","#fabfd2","#8cd17d","#b6992d","#499894",
        "#86bcb6","#e15759","#79706e","#d4a6c8",
      ];

      const datasets = rooms.map((room, i) => ({
        label: `Room ${room}`,
        data: years.map(y => data[y]?.[room] ?? 0),
        backgroundColor: palette[i % palette.length],
        stack: "nights",
      }));

      new Chart(document.getElementById("chart"), {
        type: "bar",
        data: { labels: years, datasets },
        options: {
          responsive: true,
          plugins: {
            legend: { position: "right" },
            tooltip: {
              callbacks: {
                footer: (items) => {
                  const total = items.reduce((s, i) => s + i.parsed.y, 0);
                  return `Total: ${total} nights`;
                },
              },
            },
          },
          scales: {
            x: { stacked: true, title: { display: true, text: "Year" } },
            y: { stacked: true, title: { display: true, text: "Nights occupied" } },
          },
        },
      });
    </script>
  </body>
</html>
