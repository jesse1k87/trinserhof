<div
  style="font-family: pragmatica-extended, Arial, sans-serif; color: #070404"
>
  <form
    id="contact-form"
    action="javascript:void(0);"
    style="display: flex; flex-direction: column; gap: 12px"
  >
    <input type="hidden" name="contact_number" />
    <div style="display: flex; flex-direction: column; gap: 6px">
      <label style="font-family: presley-slab, Arial, sans-serif">Name</label>
      <input id="contact-form-name" name="name" />
      <div id="contact-form-name-error" class="contact-form-error">
        Bitte Ihre Name hinzüfugen.
      </div>
    </div>
    <div style="display: flex; flex-direction: column; gap: 6px">
      <label style="font-family: presley-slab, Arial, sans-serif"
        >Email Adresse</label
      >
      <input id="contact-form-email" name="email" placeholder="" />
      <div id="contact-form-email-error" class="contact-form-error">
        Bitte Ihre Email Adresse hinzüfugen.
      </div>
    </div>
    <div style="display: flex; flex-direction: column; gap: 6px">
      <label style="font-family: presley-slab, Arial, sans-serif"
        >Nachricht</label
      >
      <textarea id="contact-form-message" name="message" rows="4"></textarea>
      <div id="contact-form-message-error" class="contact-form-error">
        Bitte ein Nachricht hinzüfugen.
      </div>
    </div>
    <div
      style="
        display: flex;
        flex-direction: column;
        gap: 6px;
        align-items: flex-start;
      "
    >
      <button id="contact-form-button" type="submit">Senden</button>
    </div>
  </form>
  <div id="contact-form-status" style="display: none">
    Vielen Dank für Ihre Nachricht, wir werden uns baldmöglichst bei Ihnen
    melden.<br />
    <br />
    Mit freundlichen Grüßen,<br />
    <br />
    Familie Covi
  </div>
</div>
<style>
  #contact-form-name,
  #contact-form-email,
  #contact-form-message {
    line-height: 18px;
    font-size: 16px;
    padding: 4px;
    font-family: Arial, sans-serif;
  }
  #contact-form-button {
    border: 2px solid #ff7300;
    color: #ff7300;
    background: transparent;
    padding: 0.8rem 2rem;
    font-size: 18px;
  }
  #contact-form-button:hover {
    border: 2px solid #ff7300;
    color: white;
    background: #ff7300;
    cursor: pointer;
  }
  .contact-form-error {
    visibility: hidden;
    color: #ff3000;
    line-height: 18px;
    font-size: 14px;
  }
</style>
<script
  type="text/javascript"
  src="https://cdn.jsdelivr.net/npm/emailjs-com@2/dist/email.min.js"
></script>
<script type="text/javascript">
  const form = document.getElementById("contact-form");
  emailjs.init("U25C0lzXxqICB0tBR");

  form.addEventListener("submit", function (event) {
    const name = document.getElementById("contact-form-name");
    const email = document.getElementById("contact-form-email");
    const message = document.getElementById("contact-form-message");
    const button = document.getElementById("contact-form-button");
    const status = document.getElementById("contact-form-status");
    const errorElName = document.getElementById(`contact-form-name-error`);
    const errorElEmail = document.getElementById(`contact-form-email-error`);
    const errorElMessage = document.getElementById(
      `contact-form-message-error`
    );

    event.preventDefault();

    errorElName.style.visibility =
      name && name.value === "" ? "visible" : "hidden";
    errorElEmail.style.visibility =
      email && email.value === "" ? "visible" : "hidden";
    errorElMessage.style.visibility =
      message && message.value === "" ? "visible" : "hidden";

    if (name.value !== "" && email.value !== "" && message.value !== "") {
      button.disabled = true;
      button.innerHTML = "Sending...";
      emailjs.sendForm("service_ws2quvy", "template_ophv7wi", form).then(
        function () {
          status.style.display = "block";
          button.disabled = false;
          button.innerHTML = "Senden";
        },
        function (error) {
          console.log("error", error);
          button.disabled = false;
          button.innerHTML = "Senden";
        }
      );
    }
  });
</script>
