[build]
  command = "turbo run build --filter=client..."
  publish = "apps/client/public"
  # Skip the build entirely when nothing under apps/client or packages/ changed
  # (e.g. apps/server, apps/form, apps/mews-sync edits don't affect this deploy).
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- apps/client packages/"

[build.environment]
  NODE_VERSION = "20"
  # Firebase client config values aren't secret — they're embedded in
  # client-side bundles by design (https://firebase.google.com/docs/projects/api-keys) —
  # but Netlify's secrets scanner otherwise fails the build because esbuild
  # bakes them into apps/client/public and apps/form/public.
  SECRETS_SCAN_OMIT_KEYS = "FIREBASE_DATABASE_URL,FIREBASE_API_KEY,FIREBASE_APP_ID,FIREBASE_AUTH_DOMAIN,FIREBASE_MESSAGING_SENDER_ID,FIREBASE_PROJECT_ID,FIREBASE_STORAGE_BUCKET"