[build]
  command = "turbo run build --filter=client..."
  publish = "apps/client/public"
  # Skip the build entirely when nothing under apps/client or packages/ changed
  # (e.g. apps/server, apps/form, apps/mews-sync edits don't affect this deploy).
  ignore = "git diff --quiet $CACHED_COMMIT_REF $COMMIT_REF -- apps/client packages/"

[build.environment]
  NODE_VERSION = "20"
  # The Firebase web config (including the apiKey) is hardcoded in
  # packages/constants/src/FIREBASE_CONFIG.ts — it isn't secret, it's meant
  # to ship in client-side bundles (https://firebase.google.com/docs/projects/api-keys).
  # Netlify's smart secret-scanning otherwise flags the apiKey literal (it
  # matches the generic Google API key pattern) and blocks the deploy, so
  # it's safelisted here rather than treated as a leaked secret.
  SECRETS_SCAN_SMART_DETECTION_OMIT_VALUES = "AIzaSyDxlroxv41EpQxb5PwEyjAFGvWzgUNkgrM"