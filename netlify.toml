[build]
  command = "turbo run build"
  publish = "apps/client/public"

[build.environment]
  NODE_VERSION = "20"
  # The Firebase database URL is not secret either — it's embedded in
  # client-side bundles (https://firebase.google.com/docs/projects/api-keys) —
  # but Netlify's secrets scanner otherwise fails the build because esbuild
  # bakes it into apps/client/public and apps/form/public by design.
  SECRETS_SCAN_OMIT_KEYS = "FIREBASE_DATABASE_URL"