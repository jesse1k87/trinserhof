[build]
  command = "turbo run build"
  publish = "apps/client/public"

[build.environment]
  NODE_VERSION = "20"
  # Firebase web config values are not secret — they're meant to be embedded
  # in client-side bundles (https://firebase.google.com/docs/projects/api-keys).
  # Netlify's secrets scanner otherwise fails the build because esbuild bakes
  # these into apps/client/public and apps/form/public by design.
  SECRETS_SCAN_OMIT_KEYS = "FIREBASE_API_KEY,FIREBASE_APP_ID,FIREBASE_AUTH_DOMAIN,FIREBASE_DATABASE_URL,FIREBASE_MESSAGING_SENDER_ID,FIREBASE_PROJECT_ID,FIREBASE_STORAGE_BUCKET"